services:

  db:
    image: postgres:15
    container_name: dubai-db
    restart: always
    environment:
      POSTGRES_USER: dubai-user
      POSTGRES_PASSWORD: 3356
      POSTGRES_DB: dubai_db
    ports:
      - "5432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U dubai-user -d dubai_db" ]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    restart: always
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    volumes:
      - ./config:/app/config
    environment:
      CONFIG_PATH: "/app/config/local.yml"

  migrate:
    image: migrate/migrate
    depends_on:
      db:
        condition: service_healthy
    command: [ "-path", "/migrations", "-database", "postgres://dubai-user:3356@db:5432/dubai_db?sslmode=disable", "up" ]
    volumes:
      - ./migrations:/migrations

volumes:
  db-data: